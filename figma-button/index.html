<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Button Component</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #F8F9FA;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 48px;
    }

    .button-showcase {
      display: flex;
      flex-direction: column;
      gap: 32px;
      align-items: flex-start;
    }

    .row {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* Base button */
    .btn {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 16px;
      line-height: 1;
      letter-spacing: 0.2px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      padding: 14px 28px;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    /* Primary */
    .btn-primary {
      background: #5C6BC0;
      color: #ffffff;
    }
    .btn-primary:hover { background: #3F4FAA; }

    /* Secondary */
    .btn-secondary {
      background: #EEF0FF;
      color: #5C6BC0;
    }
    .btn-secondary:hover { background: #D9DCFF; }

    /* Danger */
    .btn-danger {
      background: #EF5350;
      color: #ffffff;
    }
    .btn-danger:hover { background: #C62828; }

    /* Ghost / Outline */
    .btn-ghost {
      background: transparent;
      color: #5C6BC0;
      border: 2px solid #5C6BC0;
    }
    .btn-ghost:hover { background: #EEF0FF; }

    /* Disabled */
    .btn-disabled {
      background: #E0E0E0;
      color: #9E9E9E;
      cursor: not-allowed;
    }

    /* Sizes */
    .btn-sm {
      font-size: 13px;
      padding: 10px 20px;
      border-radius: 8px;
    }
    .btn-lg {
      font-size: 18px;
      padding: 18px 36px;
      border-radius: 12px;
    }

    /* Icon button */
    .btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }
  </style>
</head>
<body>
  <div class="button-showcase">

    <!-- Variants -->
    <div class="row">
      <button class="btn btn-primary">Primary</button>
      <button class="btn btn-secondary">Secondary</button>
      <button class="btn btn-danger">Danger</button>
      <button class="btn btn-ghost">Ghost</button>
      <button class="btn btn-disabled" disabled>Disabled</button>
    </div>

    <!-- Sizes -->
    <div class="row">
      <button class="btn btn-primary btn-sm">Small</button>
      <button class="btn btn-primary">Medium</button>
      <button class="btn btn-primary btn-lg">Large</button>
    </div>

    <!-- With icons -->
    <div class="row">
      <button class="btn btn-primary">
        <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
        Get Started
      </button>
      <button class="btn btn-ghost">
        <svg viewBox="0 0 24 24"><path d="M19 11H7.83l4.88-4.88c.39-.39.39-1.03 0-1.42-.39-.39-1.02-.39-1.41 0l-6.59 6.59c-.39.39-.39 1.02 0 1.41l6.59 6.59c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41L7.83 13H19c.55 0 1-.45 1-1s-.45-1-1-1z"/></svg>
        Go Back
      </button>
    </div>

  </div>
</body>
</html>
